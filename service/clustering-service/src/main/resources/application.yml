server:
  port: 8086

spring:
  application:
    name: clustering-service

  datasource:
    url: jdbc:mysql://localhost:3306/wayzy_clustering?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000

clustering:
  algorithm:
    type: KMEANS # KMEANS, DBSCAN, HIERARCHICAL
    k-means:
      clusters: 5
      max-iterations: 100
    dbscan:
      eps: 0.5
      min-points: 3
  update:
    schedule: "0 0 2 * * ?" # Chạy clustering mỗi ngày lúc 2h sáng
    batch-size: 1000


