server:
  port: 8085

spring:
  application:
    name: booking-service
  profiles:
    active: dev
  security:
    user:
      name: none
      password: none
  config:
    import: "configserver:" # Import configuration from the Config Server

  cloud:
    config:
      uri: http://localhost:8080
      fail-fast: true
      retry:
        max-attempts: 6 # Maximum number of retry attempts
        multiplier: 1.2 # Multiplier for the retry interval
        initial-interval: 1000 # Retry interval in milliseconds

# Feign client configuration
feign:
  client:
    config:
      default:
        connect-timeout: 5000
        read-timeout: 10000
        logger-level: basic

sepay:
  account: "19394331899"
  bank: "TPBank"
  description: "Thanh toán đặt tour"
  webhookSecret: "CHANGE_ME" # optional if Sepay signs webhook