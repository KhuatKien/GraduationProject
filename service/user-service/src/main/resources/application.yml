server:
  port: 8083
spring:
  application:
    name: user-service
  profiles:
    active: dev
  config:
    import: "configserver:" # Import configuration from the Config Server

  cloud:
    config:
      uri: http://localhost:8080
      fail-fast: true
      retry:
        max-attempts: 6 # Maximum number of retry attempts
        multiplier: 1.2 # Multiplier for the retry interval
        initial-interval: 1000 # Retry interval in milliseconds
    discovery:
      enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
